name: CI

on:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spent
          POSTGRES_PASSWORD: spent
          POSTGRES_DB: spent
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U spent -d spent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      STORAGE_DATABASE_URL: postgresql://spent:spent@localhost:5432/spent
      JWT_SECRET: ci-test-secret-32-characters-minimum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
