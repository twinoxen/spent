name: CI

on:
  pull_request:

jobs:
  unit-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spent
          POSTGRES_PASSWORD: spent
          POSTGRES_DB: spent
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U spent -d spent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      STORAGE_DATABASE_URL: postgresql://spent:spent@localhost:5432/spent
      JWT_SECRET: ci-test-secret-32-characters-minimum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: unit-build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: spent
          POSTGRES_PASSWORD: spent
          POSTGRES_DB: spent
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U spent -d spent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      STORAGE_DATABASE_URL: postgresql://spent:spent@localhost:5432/spent
      JWT_SECRET: ci-test-secret-32-characters-minimum
      # Use pre-built preview server so Vue hydrates instantly (no Vite
      # on-demand compilation delays that cause the "Sign up" click to land
      # before event handlers are attached).
      PLAYWRIGHT_WEB_SERVER_CMD: npm run db:migrate && PORT=4173 npm run preview
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
