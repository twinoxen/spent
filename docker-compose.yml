services:
  postgres:
    image: postgres:16
    container_name: spent-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: spent
      POSTGRES_PASSWORD: spent
      POSTGRES_DB: spent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spent -d spent"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
